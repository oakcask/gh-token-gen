name: Test
on:
  pull_request: 
    paths:
      # to debug this workflow
      - .github/workflows/test.yaml
      - macros/**
      - src/**
      - Cargo.lock
      - Cargo.toml
      - rust-toolchain.toml

jobs:
  lint:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-lint-${{ github.ref }}
    permissions:
      contents: write
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ github.head_ref }}
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache-key: ${{ hashFiles('Cargo.lock') }}
      - id: generate-token
        uses: oakcask/gh-token-gen@e3d2caa8ef6111f5a516995d88890d3fb09206e3 # v5.0.0
        with:
          app-id: ${{ secrets.CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
      - uses: int128/update-generated-files-action@0d0a67cf2f8a8b7bc10c1c2ea5dffdad291b5b47 # v2
        with:
          commit-message: "chore: update action.yaml and index.cjs"
          token: ${{ steps.generate-token.outputs.token }}
      - run: cargo --locked fmt
      - uses: int128/update-generated-files-action@0d0a67cf2f8a8b7bc10c1c2ea5dffdad291b5b47 # v2
        with:
          commit-message: "style: `cargo --locked fmt`"
          token: ${{ steps.generate-token.outputs.token }}
      - run: cargo --locked clippy --fix
      - uses: int128/update-generated-files-action@0d0a67cf2f8a8b7bc10c1c2ea5dffdad291b5b47 # v2
        with:
          commit-message: "fix: `cargo --locked clippy --fix`"
          token: ${{ steps.generate-token.outputs.token }}
  test:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache-key: ${{ hashFiles('Cargo.lock') }}
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: wasm-pack
          version: "0.13.1"
      - run: wasm-pack test --node
  integration:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-integration-${{ github.ref }}
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: ${{ github.head_ref }}
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          cache-key: ${{ hashFiles('Cargo.lock') }}
      - uses: baptiste0928/cargo-install@f204293d9709061b7bc1756fec3ec4e2cd57dec0 # v3
        with:
          crate: wasm-pack
          version: "0.13.1"
      - run: wasm-pack build --target=nodejs . --locked
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.15.0
      - id: generate-token
        run: GITHUB_STATE=${GITHUB_OUTPUT} node index.cjs
        env:
          INPUT_APP-ID: ${{ secrets.CLIENT_ID }}
          INPUT_CLIENT-ID: ""
          INPUT_PRIVATE-KEY: ${{ secrets.PRIVATE_KEY }}
          INPUT_GITHUB-API-URL: "https://api.github.com"
          INPUT_ENDPOINT: "https://api.github.com"
          INPUT_OWNER: ""
          INPUT_REPOSITORIES: ""
          INPUT_ENTERPRISE: ""
          INPUT_SKIP-TOKEN-REVOKE: "false"
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            github.rest.issues.get({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
      - run: node index.cjs
        if: always() && ${{ steps.generate-token.outputs.wasm_actions != '' }}
        env:
          INPUT_APP-ID: ${{ secrets.CLIENT_ID }}
          INPUT_CLIENT-ID: ""
          INPUT_PRIVATE-KEY: ${{ secrets.PRIVATE_KEY }}
          INPUT_GITHUB-API-URL: "https://api.github.com"
          INPUT_ENDPOINT: "https://api.github.com"
          INPUT_OWNER: ""
          INPUT_REPOSITORIES: ""
          INPUT_ENTERPRISE: ""
          INPUT_SKIP-TOKEN-REVOKE: "false"
          # https://github.com/oakcask/wasm-actions/blob/afa65246b280183200c711b64b69c507837b0449/crates/derive/src/codegen.rs#L112
          STATE_WASM_ACTIONS: ${{ steps.generate-token.outputs.wasm_actions }}     
